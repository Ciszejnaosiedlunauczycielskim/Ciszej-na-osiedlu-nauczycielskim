name: Build final map asset

on:
  push:
    branches:
      - codex/dodaj-finalna-mape-parku-lwowska
    paths:
      - '.map-parts/**'
      - '.github/workflows/build-final-map.yml'

permissions:
  contents: write

jobs:
  build-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild approved map
        run: |
          cat .map-parts/part-*.b64 | base64 --decode > /tmp/map.jpg
          echo "b2eb6d43e3a3da6b63981523940dc7963f420f0c858d886e553e340cf20c3b0c  /tmp/map.jpg" | sha256sum -c -

      - name: Convert to PNG and update page
        run: |
          python -m pip install --quiet pillow
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          output = Path('assets/img/mapa-osiedle-park-lwowska.png')
          output.parent.mkdir(parents=True, exist_ok=True)
          with Image.open('/tmp/map.jpg') as image:
              image.convert('RGB').save(output, format='PNG', optimize=True)

          page = Path('index.html')
          text = page.read_text(encoding='utf-8')
          text = text.replace(
              'assets/img/mapa-osiedle-park-lwowska.png?v=1',
              'assets/img/mapa-osiedle-park-lwowska.png?v=2'
          )
          text = text.replace('width="2048" height="1152"', 'width="1536" height="864"')
          page.write_text(text, encoding='utf-8')
          PY

      - name: Commit final asset
        run: |
          rm -rf .codex-map .codex-map-small .map-parts
          rm -f .github/workflows/build-final-map.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Dodaj finalną mapę parku handlowego Lwowska"
          git push
